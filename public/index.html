<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AXIS Task Feedback Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ambient"></div>
  <header class="shell hero">
    <section class="hero-card">
      <div class="brand-row">
        <img class="brand-logo" src="axis-logo.png" alt="AXIS Robotics" />
        <span class="brand-chip"></span>
      </div>
      <h1>Task Feedback Board</h1>
      <p class="lead"></p>
      <div class="actions">
        <button class="btn primary" id="refreshBtn">Sync New Tasks</button>
      </div>
    </section>
  </header>

  <main class="shell board-wrap">
    <section class="card main-card">
      <div class="toolbar">
        <div>
          <span class="section-kicker">Live Tasks</span>
          <h2>Today Tasks</h2>
          <p class="muted" id="todayCount">Loading live tasks...</p>
        </div>
        <label class="field small-field">
          <span>Search</span>
          <input id="searchInput" placeholder="Search task title..." />
        </label>
      </div>
      <section class="task-grid" id="todayGrid"></section>
    </section>

    <section class="card main-card archive-card">
      <div class="toolbar compact-toolbar">
        <div>
          <span class="section-kicker">Saved Tasks</span>
          <h2>Saved Tasks</h2>
          <p class="muted" id="sevenDayCount">Tasks automatically move here after 24 hours or when they disappear from the live API.</p>
        </div>
      </div>
      <section class="task-grid" id="sevenDayGrid"></section>
    </section>
  </main>

  <footer class="shell site-footer">
    <span>Built by</span>
    <a href="https://t.me/NPCKRIPTO" target="_blank" rel="noopener noreferrer">NPCCRYPTO</a>
  </footer>

  <script type="module" src="index.js"></script>
</body>
</html>
