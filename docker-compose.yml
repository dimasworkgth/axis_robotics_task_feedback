services:
  axis-task-monitor:
    build: .
    container_name: axis-task-monitor
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - translation-cache:/app/.cache
    depends_on:
      - libretranslate

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: axis-libretranslate
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      - libretranslate-data:/home/libretranslate/.local

volumes:
  translation-cache:
  libretranslate-data:
